<script>
// ═══════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════
let offres = [];
let filtreT = "actives";
let filtreS = "actif";
const STATUTS = ["À candidater","Postulé","Entretien","À relancer","Sans réponse","Refus"];

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function setVue(v, el) {
  document.getElementById("vue-triage").style.display = v === "triage" ? "" : "none";
  document.getElementById("vue-suivi").style.display  = v === "suivi"  ? "" : "none";
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === el));
}

function setF(el) {
  filtreT = el.dataset.f;
  document.querySelectorAll("[data-f]").forEach(b => b.classList.toggle("active", b === el));
  renderTriage();
}

function setFS(el) {
  filtreS = el.dataset.fs;
  document.querySelectorAll("[data-fs]").forEach(b => b.classList.toggle("active", b === el));
  renderSuivi();
}

// ═══════════════════════════════════════════════
// CALCUL DATE RELANCE — J+10 jours ouvrés (lun-ven)
// ═══════════════════════════════════════════════
function prochainJourOuvre(dateStr, joursOuvres) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return "";
  let count = 0;
  while (count < joursOuvres) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++; // 0=dimanche, 6=samedi
  }
  return d.toISOString().slice(0, 10); // YYYY-MM-DD
}

// ═══════════════════════════════════════════════
// CHARGEMENT DONNÉES
// ═══════════════════════════════════════════════
async function charger() {
  const btn = document.getElementById("btnRefresh");
  btn.disabled = true;
  btn.textContent = "Chargement…";
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/Offres?key=${CONFIG.API_KEY}`;
    const r   = await fetch(url);
    const d   = await r.json();
    if (d.error) throw new Error(d.error.message);
    const rows = (d.values || []).slice(1);
    offres = rows.map(r => ({
      id:              col(r,0),  jobId:           col(r,1),
      client:          col(r,2),  cabinet:         col(r,3),
      poste:           col(r,4),  source:          col(r,5),
      dateReception:   col(r,6),  dateOffre:       col(r,7),
      note:            col(r,8),  catAuto:         col(r,9),
      catValidee:      col(r,10), triageAction:    col(r,11),
      suiviStatut:     col(r,12), localisation:    col(r,13),
      taille:          col(r,14), salaire:         col(r,15),
      contact:         col(r,16), lien:            col(r,17),
      dateCandidature: col(r,18), dateLimite:      col(r,19),
      notesSuivi:      col(r,20), doublonIds:      col(r,21),
      sourcesVues:     col(r,22), cvUtilise:       col(r,23),
      dateRelance:     col(r,24)
    })).filter(o => o.id && o.poste);
  } catch(e) {
    alert("Erreur chargement : " + e.message + "\n\nVérifier API_KEY et partage du Sheet.");
  }
  btn.disabled = false;
  btn.textContent = "↻ Rafraîchir";
  majStats();
  majAlertes();
  renderTriage();
  renderSuivi();
}

const col = (r, i) => (r[i] || "").toString().trim();

// ═══════════════════════════════════════════════
// ÉCRITURE WEBHOOK
// FIX : suppression mode "no-cors" qui bloquait les headers
// et empêchait l'écriture réelle dans le Sheet
// ═══════════════════════════════════════════════
function ecrire(id, champ, valeur) {
  // 1. Mise à jour locale immédiate
  const o = offres.find(x => x.id === id);
  if (o) {
    const camel = champ.replace(/_([a-z])/g, (_,c) => c.toUpperCase());
    o[camel] = valeur;
  }
  // 2. Envoi webhook — Content-Type text/plain pour éviter le preflight CORS
  //    Apps Script lit e.postData.contents correctement avec ce content-type
  fetch(CONFIG.WEBHOOK_URL, {
    method:  "POST",
    headers: {"Content-Type": "text/plain"},
    body:    JSON.stringify({ id, champ, valeur })
  }).catch(e => console.error("Webhook:", e.message));
  majStats();
  majAlertes();
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer = null;
function toast(msg, duree) {
  duree = duree || 2200;
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), duree);
}

// ═══════════════════════════════════════════════
// ACTIONS TRIAGE
// ═══════════════════════════════════════════════
function candidater(id) {
  ecrire(id, "triage_action", "en_suivi");
  ecrire(id, "suivi_statut",  "À candidater");
  const o = offres.find(x => x.id === id);
  const label = o ? (o.client !== "À confirmer" ? o.client : o.poste) : "";
  toast("✓ Ajouté au suivi — " + label);
  renderTriage();
}

function ecarter(id) {
  ecrire(id, "triage_action", "ecarte_manuel");
  ecrire(id, "suivi_statut",  "");
  toast("✕ Offre écartée");
  renderTriage();
}

function reactiverCarte(id) {
  ecrire(id, "triage_action", "");
  ecrire(id, "suivi_statut",  "");
  toast("↩ Offre réactivée");
  renderTriage();
}

// ═══════════════════════════════════════════════
// STATS & ALERTES
// ═══════════════════════════════════════════════
function majStats() {
  document.getElementById("s-total").textContent     = offres.length;
  document.getElementById("s-short").textContent     = offres.filter(o => o.suiviStatut === "À candidater").length;
  document.getElementById("s-postule").textContent   = offres.filter(o => ["Postulé","Entretien","À relancer"].includes(o.suiviStatut)).length;
  document.getElementById("s-entretien").textContent = offres.filter(o => o.suiviStatut === "Entretien").length;
}

function majAlertes() {
  const auj = new Date();
  const al  = [];

  // Relances en retard — offres Postulé ou À relancer dont date_relance est dépassée
  const rl = offres.filter(o => {
    if (o.triageAction !== "en_suivi") return false;
    if (!["Postulé","À relancer"].includes(o.suiviStatut)) return false;
    if (!o.dateRelance) return false;
    return new Date(o.dateRelance) <= auj;
  });
  if (rl.length) al.push({ cls:"alerte-relance", txt:`🔔 ${rl.length} candidature(s) à relancer` });

  // Shortlist en attente
  const sh = offres.filter(o => o.suiviStatut === "À candidater").length;
  if (sh) al.push({ cls:"alerte-info", txt:`📋 ${sh} offre(s) shortlistée(s) à candidater` });

  document.getElementById("alertes").innerHTML = al.map(a =>
    `<div class="alerte ${a.cls}">${a.txt}</div>`).join("");
}

// ═══════════════════════════════════════════════
// RENDU TRIAGE
// ═══════════════════════════════════════════════
function renderTriage() {
  const q    = (document.getElementById("qTriage").value || "").toLowerCase();
  const sort = document.getElementById("sortTriage").value;
  const auj  = new Date();

  let data = offres.filter(o => {
    if (q && !(o.poste+o.client+o.cabinet+o.localisation).toLowerCase().includes(q)) return false;
    const cat    = o.catValidee || o.catAuto;
    const ecarte = o.triageAction === "ecarte_manuel";
    if (filtreT === "actives")   return !ecarte && o.triageAction !== "en_suivi";
    if (filtreT === "shortlist") return o.suiviStatut === "À candidater";
    if (filtreT === "cible")     return cat === "cible" && !ecarte;
    if (filtreT === "jugement")  return cat === "jugement" && !ecarte;
    if (filtreT === "ecarte")    return ecarte;
    return true;
  });

  if (sort === "cat")       data.sort((a,b) => ["cible","jugement","ecarte"].indexOf(a.catAuto) - ["cible","jugement","ecarte"].indexOf(b.catAuto));
  else if (sort === "client") data.sort((a,b) => a.client.localeCompare(b.client,"fr"));
  else data.sort((a,b) => new Date(b.dateReception) - new Date(a.dateReception));

  document.getElementById("cntTriage").textContent = `${data.length} offre${data.length>1?"s":""}`;

  const el = document.getElementById("cartesTriage");
  if (!data.length) { el.innerHTML = '<div class="empty">Aucune offre pour ce filtre.</div>'; return; }

  el.innerHTML = data.map(o => {
    const cat      = o.catValidee || o.catAuto;
    const isNew    = (auj - new Date(o.dateReception)) < 48*3600000;
    const isShort  = o.suiviStatut === "À candidater";
    const isEcarte = o.triageAction === "ecarte_manuel";
    const clientAff = o.client === "À confirmer" ? "—" : esc(o.client);

    const badgeCat = cat==="cible"  ? `<span class="badge b-cible">Cible</span>`
                   : cat==="ecarte" ? `<span class="badge b-ecarte-auto">Écarté auto</span>`
                   :                  `<span class="badge b-jugement">À juger</span>`;

    let actions;
    if (isEcarte) {
      actions = `<button class="btn btn-sm" onclick="reactiverCarte('${o.id}')">↩ Réactiver</button>`;
    } else if (isShort) {
      actions = `<button class="btn btn-sm" style="background:#eaf3de;color:#0f6e56;border-color:#c0dd97" disabled>✓ Shortlistée</button>
                 <button class="btn btn-sm btn-danger" onclick="ecarter('${o.id}')">Écarter</button>`;
    } else {
      actions = `<button class="btn btn-sm btn-primary" onclick="candidater('${o.id}')">+ À candidater</button>
                 <button class="btn btn-sm btn-danger" onclick="ecarter('${o.id}')">Écarter</button>`;
    }

    return `<div class="carte${isEcarte?" ecarte":""}">
  <div class="carte-body">
    <div class="carte-top">
      <span class="poste">${esc(o.poste)}</span>
      <div class="badges">
        ${badgeCat}
        ${isNew   ? '<span class="badge b-new">Nouveau</span>' : ""}
        ${isShort ? '<span class="badge b-shortlist">À candidater</span>' : ""}
      </div>
    </div>
    <div class="meta">
      <span>${clientAff}</span>
      ${o.cabinet      ? `<span class="cabinet-tag">${esc(o.cabinet)}</span>` : ""}
      ${o.localisation ? `<span>📍 ${esc(o.localisation)}</span>` : ""}
      ${o.salaire      ? `<span class="salaire-tag">💰 ${esc(o.salaire)}</span>` : ""}
      <span>${o.dateReception}</span>
    </div>
  </div>
  <div class="carte-actions">
    ${actions}
    ${o.lien ? `<a class="btn btn-sm lien-btn" href="${o.lien}" target="_blank">Voir →</a>` : ""}
  </div>
</div>`;
  }).join("");
}

// ═══════════════════════════════════════════════
// RENDU SUIVI
// ═══════════════════════════════════════════════
function renderSuivi() {
  const q   = (document.getElementById("qSuivi").value || "").toLowerCase();
  const auj = new Date();

  let data = offres.filter(o => {
    if (o.triageAction !== "en_suivi") return false;
    if (q && !(o.poste+o.client+o.cabinet).toLowerCase().includes(q)) return false;
    if (filtreS === "actif")     return ["À candidater","Postulé","Entretien","À relancer"].includes(o.suiviStatut);
    if (filtreS === "postule")   return ["Postulé","À relancer"].includes(o.suiviStatut);
    if (filtreS === "entretien") return o.suiviStatut === "Entretien";
    if (filtreS === "clos")      return ["Sans réponse","Refus"].includes(o.suiviStatut);
    return true;
  }).sort((a,b) => {
    const ord = ["À candidater","Postulé","Entretien","À relancer","Sans réponse","Refus"];
    return ord.indexOf(a.suiviStatut) - ord.indexOf(b.suiviStatut);
  });

  document.getElementById("cntSuivi").textContent = `${data.length} offre${data.length>1?"s":""}`;

  const tbody = document.getElementById("tbodySuivi");
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="9"><div class="empty">Aucune candidature pour ce filtre.</div></td></tr>`;
    return;
  }

  const statutCls = {
    "À candidater": "s-candidater",
    "Postulé":      "s-postule",
    "Entretien":    "s-entretien",
    "À relancer":   "s-arelancer",
    "Sans réponse": "s-sansreponse",
    "Refus":        "s-refus"
  };

  tbody.innerHTML = data.map(o => {
    const retardRelance = o.dateRelance && ["Postulé","À relancer"].includes(o.suiviStatut)
      && new Date(o.dateRelance) <= auj;

    const selStatut = `<select class="sel-inline ${statutCls[o.suiviStatut]||""}"
      onchange="onChangeStatut('${o.id}',this)">
      ${STATUTS.map(s => `<option${s===o.suiviStatut?" selected":""}>${s}</option>`).join("")}
    </select>`;

    const selCV = `<select class="sel-inline" onchange="ecrire('${o.id}','cv_utilise',this.value)">
      <option value="">—</option>
      <option${o.cvUtilise==="Revenue"?" selected":""}>Revenue</option>
      <option${o.cvUtilise==="Ops"?" selected":""}>Ops</option>
    </select>`;

    const clientAff = o.client === "À confirmer" ? "—" : esc(o.client);

    // Alerte visuelle si date relance dépassée
    const relanceStyle = retardRelance ? "color:#a32d2d;font-weight:600" : "";

    return `<tr>
  <td class="td-poste" title="${esc(o.poste)}">${esc(o.poste.length>40 ? o.poste.slice(0,38)+"…" : o.poste)}</td>
  <td class="td-client">${clientAff}${o.cabinet ? `<br><span class="cabinet-tag">${esc(o.cabinet)}</span>` : ""}</td>
  <td>${selStatut}${retardRelance ? '<br><span style="color:#a32d2d;font-size:11px">⚠ Relancer</span>' : ""}</td>
  <td>${selCV}</td>
  <td><input class="inp-inline" type="date" value="${o.dateCandidature}"
       onchange="onChangeDateCandidature('${o.id}',this.value)"></td>
  <td><input class="inp-inline" type="text" value="${esc(o.contact)}" placeholder="Nom…"
       onchange="ecrire('${o.id}','contact',this.value)"></td>
  <td><input class="inp-inline" type="date" value="${o.dateRelance}" style="${relanceStyle}"
       onchange="ecrire('${o.id}','date_relance',this.value)"></td>
  <td><textarea class="notes-txt" placeholder="Notes…"
       onchange="ecrire('${o.id}','notes_suivi',this.value)">${esc(o.notesSuivi)}</textarea></td>
  <td>${o.lien ? `<a class="lien-btn" href="${o.lien}" target="_blank">→ LinkedIn</a>` : ""}</td>
</tr>`;
  }).join("");
}

// ═══════════════════════════════════════════════
// HANDLERS SPÉCIAUX
// ═══════════════════════════════════════════════

// Changement statut : met à jour la couleur du select + écrit dans le Sheet
function onChangeStatut(id, selectEl) {
  const valeur = selectEl.value;
  const statutCls = {
    "À candidater": "s-candidater",
    "Postulé":      "s-postule",
    "Entretien":    "s-entretien",
    "À relancer":   "s-arelancer",
    "Sans réponse": "s-sansreponse",
    "Refus":        "s-refus"
  };
  selectEl.className = "sel-inline " + (statutCls[valeur] || "");
  ecrire(id, "suivi_statut", valeur);
}

// Changement date candidature : écrit la date ET calcule la date de relance J+10 ouvrés
function onChangeDateCandidature(id, valeur) {
  ecrire(id, "date_candidature", valeur);
  const dateRelance = prochainJourOuvre(valeur, CONFIG.SEUIL_RELANCE);
  if (dateRelance) {
    ecrire(id, "date_relance", dateRelance);
    // Mettre à jour le champ date_relance visuellement dans la même ligne
    const o = offres.find(x => x.id === id);
    if (o) {
      // Trouver l'input date_relance dans le DOM et le mettre à jour
      const inputs = document.querySelectorAll(`#tbodySuivi input[type="date"]`);
      inputs.forEach(inp => {
        // L'input relance est le 2ème input[type=date] de la ligne de cette offre
        // On re-render proprement plutôt que de chercher dans le DOM
      });
      renderSuivi();
    }
  }
}

// ═══════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════
function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ═══════════════════════════════════════════════

charger();
</script>
